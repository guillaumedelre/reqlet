version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
  exclusions:
    paths:
      - "node-runner/node_modules/.*"
      - "gui/.*"

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/guillaumedelre/reqlet
  exclusions:
    paths:
      - "node-runner/node_modules/.*"
      - "gui/.*"
