services:
  go:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - runner-modules:/app/runner/node_modules
    working_dir: /app
    command: gotestsum ./engine/... ./cli/... ./agent/... ./hub/...

  lint:
    image: golangci/golangci-lint:latest
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    command: golangci-lint run ./engine/... ./cli/... ./agent/... ./hub/...

  build-cli:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    command: go build -o dist/reqlet-cli ./cli/...

  node:
    image: node:22-alpine
    volumes:
      - ./runner:/app
      - runner-modules:/app/node_modules
    working_dir: /app

  web:
    image: node:22-alpine
    volumes:
      - ./gui/web:/app
      - web-modules:/app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://dev-agent:8080
    command: npm run dev -- --host

  # Fast dev agent: compiles and runs Go directly, no Docker image rebuild needed.
  # The embedded agent/web/ placeholder is enough — Vite (port 5173) serves the real UI.
  dev-agent:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    ports:
      - "3001:8080"
    command: go run ./agent/...

  # Production agent: full build (npm build → go:embed → alpine). Used for release testing.
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "3001:8080"
    volumes:
      - reqlet-data:/data

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: reqlet
      POSTGRES_PASSWORD: reqlet
      POSTGRES_DB: reqlet_hub
    ports:
      - "5432:5432"
    volumes:
      - hub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqlet -d reqlet_hub"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Fast dev hub: compiles and runs Go directly, no Docker image rebuild needed.
  dev-hub:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    ports:
      - "3002:8082"
    depends_on:
      postgres:
        condition: service_healthy
    command: go run ./hub/...

  # Production hub: full build via Dockerfile.hub.
  hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    ports:
      - "3002:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  go-cache:
  go-mod-cache:
  runner-modules:
  web-modules:
  reqlet-data:
  hub-db-data:
