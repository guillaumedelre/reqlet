services:
  go:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
      - node-runner-modules:/app/node-runner/node_modules
    working_dir: /app
    command: gotestsum ./engine/... ./cli/... ./agent/...

  lint:
    image: golangci/golangci-lint:latest
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    command: golangci-lint run ./engine/... ./cli/... ./agent/...

  build-cli:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    command: go build -o dist/reqlet-cli ./cli/...

  node:
    image: node:22-alpine
    volumes:
      - ./node-runner:/app
      - node-runner-modules:/app/node_modules
    working_dir: /app

  web:
    image: node:22-alpine
    volumes:
      - ./gui/web:/app
      - web-modules:/app/node_modules
    working_dir: /app
    ports:
      - "5173:5173"
    command: npm run dev -- --host

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "3001:8080"
    volumes:
      - reqlet-data:/data

volumes:
  go-cache:
  go-mod-cache:
  node-runner-modules:
  web-modules:
  reqlet-data:
