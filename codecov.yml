coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      reqlet-engine:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-engine
        paths:
          - "engine/"
      reqlet-cli:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-cli
        paths:
          - "cli/"
      reqlet-agent:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-agent
        paths:
          - "agent/"
      reqlet-web:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-web
        paths:
          - "gui/web/src/"
      reqlet-runner:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-runner
        paths:
          - "runner/src/"
      reqlet-hub:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-hub
        paths:
          - "hub/"
    patch:
      default:
        target: 80%
        threshold: 1%

flags:
  reqlet-engine:
    paths:
      - engine/
    carryforward: true
  reqlet-cli:
    paths:
      - cli/
    carryforward: true
  reqlet-agent:
    paths:
      - agent/
    carryforward: true
  reqlet-web:
    paths:
      - gui/web/src/
    carryforward: true
  reqlet-runner:
    paths:
      - runner/src/
    carryforward: true
  reqlet-hub:
    paths:
      - hub/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "**/*_test.go"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.test.js"
  - "**/__tests__/**"
  - "docs/**"
  - "gui/web/src/test/**"
  - "gui/web/src/components/**"
  - "gui/web/src/lib/backend.ts"
  - "cli/main.go"
  - "agent/main.go"
  - "hub/main.go"
