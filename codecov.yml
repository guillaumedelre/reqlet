coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      reqlet-engine:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-engine-unit
          - reqlet-engine-functional
        paths:
          - "engine/"
      reqlet-cli:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-cli-unit
          - reqlet-cli-functional
        paths:
          - "cli/"
      reqlet-agent:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-agent-unit
          - reqlet-agent-functional
        paths:
          - "agent/"
      reqlet-web:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-web-unit
          - reqlet-web-functional
        paths:
          - "gui/web/src/"
      reqlet-runner:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-runner-unit
          - reqlet-runner-functional
        paths:
          - "runner/src/"
      reqlet-hub:
        target: 80%
        threshold: 1%
        flags:
          - reqlet-hub-unit
          - reqlet-hub-functional
        paths:
          - "hub/"
    patch:
      default:
        target: 80%
        threshold: 1%

flags:
  reqlet-engine-unit:
    paths:
      - engine/
    carryforward: true
  reqlet-engine-functional:
    paths:
      - engine/
    carryforward: true
  reqlet-cli-unit:
    paths:
      - cli/
    carryforward: true
  reqlet-cli-functional:
    paths:
      - cli/
    carryforward: true
  reqlet-agent-unit:
    paths:
      - agent/
    carryforward: true
  reqlet-agent-functional:
    paths:
      - agent/
    carryforward: true
  reqlet-hub-unit:
    paths:
      - hub/
    carryforward: true
  reqlet-hub-functional:
    paths:
      - hub/
    carryforward: true
  reqlet-web-unit:
    paths:
      - gui/web/src/
    carryforward: true
  reqlet-web-functional:
    paths:
      - gui/web/src/
    carryforward: true
  reqlet-runner-unit:
    paths:
      - runner/src/
    carryforward: true
  reqlet-runner-functional:
    paths:
      - runner/src/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "**/*_test.go"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.test.js"
  - "**/__tests__/**"
  - "docs/**"
  - "gui/web/src/test/**"
  - "gui/web/src/components/**"
  - "gui/web/src/App.tsx"
  - "gui/web/src/main.tsx"
  - "gui/web/src/lib/backend.ts"
  - "cli/main.go"
  - "agent/main.go"
  - "hub/main.go"
