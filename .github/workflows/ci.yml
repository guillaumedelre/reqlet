name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Check formatting
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -l . | tee /tmp/gofumpt.out
          test ! -s /tmp/gofumpt.out

      - name: Lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            golangci/golangci-lint:latest \
            golangci-lint run ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node-runner/package-lock.json

      - name: Install node-runner dependencies
        run: npm ci
        working-directory: node-runner

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- -coverprofile=coverage.out -covermode=atomic ./engine/... ./cli/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: go
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: gui/frontend/coverage/lcov.info
          flags: frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  node-runner:
    name: node-runner
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node-runner/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile.dev
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          push: false

      - name: Build Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false

      - name: Build Dockerfile.gui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gui
          push: false
