name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reqlet-engine:
    name: reqlet-engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm ci
        working-directory: runner

      # gofumpt -l . validates formatting for all Go files in the repo
      - name: Check formatting
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -l . | tee /tmp/gofumpt.out
          test ! -s /tmp/gofumpt.out

      - name: Lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            golangci/golangci-lint:latest \
            golangci-lint run ./engine/...

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./engine/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-engine
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-cli:
    name: reqlet-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            golangci/golangci-lint:latest \
            golangci-lint run ./cli/...

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./cli/... \
            ./cli/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-cli
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-agent:
    name: reqlet-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm ci
        working-directory: runner

      - name: Lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            golangci/golangci-lint:latest \
            golangci-lint run ./agent/...

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./agent/... \
            ./agent/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-agent
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-web:
    name: reqlet-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/web/package-lock.json

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: gui/web/coverage/lcov.info
          flags: reqlet-web
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-runner:
    name: reqlet-runner
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: runner/coverage/lcov.info
          flags: reqlet-runner
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-hub:
    name: reqlet-hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            golangci/golangci-lint:latest \
            golangci-lint run ./hub/...

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./hub/... \
            ./hub/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-hub
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # reqlet-gui Go code requires GTK/WebKitGTK and cannot be unit-tested in
  # standard CI. Validated via Docker build only.
  reqlet-gui:
    name: reqlet-gui (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile.gui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gui
          push: false

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile.dev
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dev
          push: false

      - name: Build Dockerfile (CLI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false

      - name: Build Dockerfile.agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: false

      - name: Build Dockerfile.hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hub
          push: false
