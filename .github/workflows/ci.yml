name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Go: single lint/format job covering all packages ─────────────────────────
  go-lint:
    name: go / lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Check formatting (gofumpt)
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -l . | tee /tmp/gofumpt.out
          test ! -s /tmp/gofumpt.out

      - name: Lint
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            golangci/golangci-lint:latest \
            golangci-lint run ./engine/... ./cli/... ./agent/... ./hub/...

  # ── reqlet-engine ─────────────────────────────────────────────────────────────
  reqlet-engine-unit:
    name: reqlet-engine / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./engine/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-engine-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-engine-functional:
    name: reqlet-engine / functional tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm ci
        working-directory: runner

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -tags=functional \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./engine/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-engine-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── reqlet-cli ────────────────────────────────────────────────────────────────
  reqlet-cli-unit:
    name: reqlet-cli / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./cli/... \
            ./cli/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-cli-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-cli-functional:
    name: reqlet-cli / functional tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm ci
        working-directory: runner

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -tags=functional \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./cli/... \
            ./cli/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-cli-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── reqlet-agent ──────────────────────────────────────────────────────────────
  reqlet-agent-unit:
    name: reqlet-agent / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./agent/... \
            ./agent/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-agent-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-agent-functional:
    name: reqlet-agent / functional tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm ci
        working-directory: runner

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -tags=functional \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./agent/... \
            ./agent/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-agent-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── reqlet-hub ────────────────────────────────────────────────────────────────
  reqlet-hub-unit:
    name: reqlet-hub / unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./hub/... \
            ./hub/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-hub-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-hub-functional:
    name: reqlet-hub / functional tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Test
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile report.xml -- \
            -tags=functional \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./hub/... \
            ./hub/...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: reqlet-hub-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── reqlet-web ────────────────────────────────────────────────────────────────
  reqlet-web-unit:
    name: reqlet-web / unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/web/package-lock.json

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: gui/web/coverage/lcov.info
          flags: reqlet-web-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-web-functional:
    name: reqlet-web / functional tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui/web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/web/package-lock.json

      - run: npm ci

      - name: Test
        run: npx vitest run --config vitest.functional.config.ts --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: gui/web/coverage/lcov.info
          flags: reqlet-web-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── reqlet-runner ─────────────────────────────────────────────────────────────
  reqlet-runner-unit:
    name: reqlet-runner / unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: runner/coverage/lcov.info
          flags: reqlet-runner-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  reqlet-runner-functional:
    name: reqlet-runner / functional tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runner
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - run: npm ci

      - name: Test
        run: node --experimental-vm-modules node_modules/.bin/jest --testPathPattern=subprocess.functional --coverage --forceExit

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: runner/coverage/lcov.info
          flags: reqlet-runner-functional
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── reqlet-gui ────────────────────────────────────────────────────────────────
  reqlet-gui:
    name: reqlet-gui (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Dockerfile.gui
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.gui
          push: false

  # ── Docker images ─────────────────────────────────────────────────────────────
  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Dockerfile.dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dev
          push: false

      - name: Build Dockerfile (CLI)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false

      - name: Build Dockerfile.agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          push: false

      - name: Build Dockerfile.hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.hub
          push: false
