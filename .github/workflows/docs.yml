name: docs

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs.yml"

jobs:
  links:
    name: links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lychee-url/lychee-action@v2
        with:
          args: >-
            --offline
            --verbose
            --no-progress
            '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
